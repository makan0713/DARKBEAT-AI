<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>DARKWAVE AI</title>

  <link rel="stylesheet" href="style.css"/>
</head>

<body>

  <!-- SPLASH -->
  <div id="splash">
    <h1>DARKWAVE AI</h1>
    <p>Create music with AI energy</p>
  </div>

  <!-- APP -->
  <div class="app" id="app">

    <div class="header">
      <h1>DARKWAVE AI</h1>
      <p>AI Music Generator</p>
    </div>

    <div class="card">

      <input id="topic" placeholder="Enter song idea..." />

      <select id="genre">
        <option>Trap</option>
        <option>Drill</option>
        <option>Lo-fi</option>
        <option>Hip-Hop</option>
        <option>Pop</option>
      </select>

      <select id="mood">
        <option>Dark</option>
        <option>Sad</option>
        <option>Hype</option>
        <option>Chill</option>
        <option>Aggressive</option>
      </select>

      <select id="lang">
        <option>English</option>
        <option>Persian</option>
        <option>German</option>
        <option>French</option>
      </select>

      <button onclick="generate()">
        ⚡ GENERATE
      </button>

    </div>

    <div id="output"></div>

    <div class="pro">
      <h3>🔥 PRO MODE</h3>
      <p>Unlimited generations + advanced AI</p>

      <button onclick="upgrade()">
        Upgrade €5/mo
      </button>
    </div>

  </div>

  <script src="app.js"></script>

</body>
</html>
