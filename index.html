<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>BeatForge AI</title>
<link rel="stylesheet" href="style.css"/>
</head>

<body>

<div class="container">

  <h1>🎧 BeatForge AI</h1>
  <p class="sub">Generate lyrics + music ideas instantly</p>

  <div class="card">

    <input id="topic" placeholder="Topic (e.g. heartbreak, hustle, victory)" />

    <select id="genre">
      <option>Trap</option>
      <option>Drill</option>
      <option>Lo-fi</option>
      <option>Pop</option>
      <option>Hip-Hop</option>
    </select>

    <select id="mood">
      <option>Sad</option>
      <option>Dark</option>
      <option>Hype</option>
      <option>Chill</option>
      <option>Aggressive</option>
    </select>

    <select id="lang">
      <option>English</option>
      <option>Persian</option>
      <option>German</option>
      <option>French</option>
    </select>

    <button onclick="generate()">🎶 Generate Song Idea</button>

  </div>

  <div id="output"></div>

  <div class="panel">
    <h3>💰 Free Plan</h3>
    <p>3 generations per day</p>
    <button onclick="upgrade()">⭐ Upgrade Pro (€5/month)</button>
  </div>

</div>

<script src="app.js"></script>
</body>
</html>
